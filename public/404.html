<!doctype html>
<html lang="en-AU">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page not found — Sowat Hossain Rafi</title>
    <!-- Error pages should never appear in search results. -->
    <meta name="robots" content="noindex" />
    <!--
      This file is standalone (inline styles, no bundle) because GitHub Pages
      serves it for ANY unknown path, where relative asset URLs would break.
      If the site moves to a custom domain, change the href below from
      /noborotno_09_portfolio/ to /.
    -->
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b1017;
        --text: #dbe4ef;
        --muted: #92a3b8;
        --accent: #2dd4bf;
      }
      @media (prefers-color-scheme: light) {
        :root {
          color-scheme: light;
          --bg: #f6f8fa;
          --text: #182230;
          --muted: #48586c;
          --accent: #0f766e;
        }
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--text);
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        text-align: center;
        padding: 1.5rem;
      }
      code {
        font-family: ui-monospace, Consolas, monospace;
        color: var(--accent);
      }
      p { color: var(--muted); }
      a { color: var(--accent); }
    </style>
  </head>
  <body>
    <main>
      <h1><code>404</code> — page not found</h1>
      <p>This is a single-page site, so there is nothing at this address.</p>
      <p><a href="/noborotno_09_portfolio/">Back to the portfolio</a></p>
    </main>
  </body>
</html>
