    <!--
      This is a client-rendered SPA, so index.html itself must carry the full
      SEO payload: crawlers and link-preview scrapers that do not execute
      JavaScript only ever see what is written here.
    -->
    <title>Sowat Hossain Rafi — Graduate SOC Analyst | AI Security Analyst</title>
    <meta
      name="description"
      content="Portfolio of Sowat Hossain Rafi, a Master of Cybersecurity graduate in Melbourne, Australia. Hands-on SOC experience: SIEM monitoring with Splunk, alert triage, phishing investigation, digital forensics and AI/LLM security."
    />
    <meta name="author" content="Sowat Hossain Rafi" />
    <link rel="canonical" href="https://sowatrafi.github.io/noborotno_09_portfolio/" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Match the browser chrome to the active theme on mobile -->
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0b1017" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f6f8fa" />

    <!-- Open Graph / social sharing (LinkedIn is the primary referrer for this site) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Sowat Hossain Rafi — Graduate SOC Analyst | AI Security Analyst" />
    <meta
      property="og:description"
      content="Master of Cybersecurity graduate in Melbourne. SIEM monitoring, alert triage, digital forensics and AI security — projects, SOC simulations and an IEEE publication, easy to verify in under two minutes."
    />
    <meta property="og:url" content="https://sowatrafi.github.io/noborotno_09_portfolio/" />
    <meta property="og:locale" content="en_AU" />
    <meta name="twitter:card" content="summary" />
  </head>
